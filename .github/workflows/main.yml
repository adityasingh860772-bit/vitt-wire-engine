name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch: # Allows you to trigger it manually for testing
  schedule:
    - cron: '30 12 * * *' # Automatically runs at 6:00 PM IST daily

jobs:
  generate_and_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Production Engine
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          python vitt_engine.py
