name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '30 3 * * *' # Runs at 9:00 AM IST daily (3:30 AM UTC)

jobs:
  generate_and_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.9'

      - name: Install Dependencies
        run: |
          pip install moviepy

      - name: Run Production Engine
        run: |
          python vitt_assembly.py

      - name: Upload Broadcast Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitt-wire-broadcast
          path: vitt_wire_live.mp4
