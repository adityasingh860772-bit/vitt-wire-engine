name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST
    - cron: '30 12 * * *' # 6:00 PM IST

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # FIX 1: Upgraded for better AI library wheel support

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # FIX 2: Added 'espeak-ng' required by XTTS
          sudo apt-get install -y ffmpeg ghostscript imagemagick libsndfile1 espeak-ng
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          # FIX 3: Force upgrade build tools before installing heavy AI libraries
          python -m pip install --upgrade pip setuptools wheel
          pip install requests fal-client moviepy==1.0.3 google-genai pytz 
          pip install TTS

      - name: Run Assembly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: python vitt_assembly.py

      - name: Run Engine
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python vitt_engine.py
