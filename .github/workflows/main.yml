name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *' # 9:00 AM IST

jobs:
  generate_and_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Critical Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 proglog==0.1.9

      - name: Run Production Engine
        run: |
          python vitt_assembly.py

      - name: Upload Broadcast Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitt-wire-broadcast
          path: vitt_wire_live.mp4
