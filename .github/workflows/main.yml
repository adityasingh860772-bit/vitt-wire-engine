name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch: # Manual test ke liye
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (UTC 3:30 AM)
    - cron: '30 9 * * *'  # 3:00 PM IST (UTC 9:30 AM)

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ghostscript

      - name: Install Python Libraries
        run: |
          pip install requests fal-client moviepy==1.0.3 google-genai pytz gTTS

      - name: Run Assembly (Content Creation)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: python vitt_assembly.py

      - name: Run Engine (Instagram Posting)
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: python vitt_engine.py
