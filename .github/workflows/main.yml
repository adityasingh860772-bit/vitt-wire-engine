name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch: # Manual test ke liye button
  schedule:
    # IST Timing: Har roz subah 9:00 AM aur shaam 6:00 PM
    - cron: '30 3 * * *'  # 9:00 AM IST
    - cron: '30 12 * * *' # 6:00 PM IST

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install System Engine (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # Subtitles ke liye ImageMagick ki security policy bypass
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/' /etc/ImageMagick-6/policy.xml
          
      - name: Install Libraries
        run: pip install fal_client google-generativeai moviepy==1.0.3 requests instagrapi
          
      - name: Run Autopilot Engine
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python vitt_assembly.py
