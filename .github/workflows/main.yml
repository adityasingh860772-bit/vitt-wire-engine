name: Vitt Wire Daily Broadcast

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST
    - cron: '30 12 * * *' # 6:00 PM IST

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache TTS Models
        uses: actions/cache@v3
        with:
          path: |
            ~/.local/share/tts
            ~/.cache/huggingface
          key: tts-xtts-model-${{ runner.os }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ghostscript imagemagick libsndfile1 espeak-ng
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install setuptools==69.5.1
          pip install torch==2.1.2 torchvision==0.16.2 torchaudio==2.1.2 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.36.2
          # MASTERMIND FIX: Using the classic, stable Google Generative AI SDK
          pip install requests fal-client moviepy==1.0.3 google-generativeai pytz 
          pip install TTS

      - name: Run Assembly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: python vitt_assembly.py

      - name: Run Engine
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python vitt_engine.py
